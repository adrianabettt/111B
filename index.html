<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placas de Trânsito – Jogo das Linguagens</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@700;800;900&display=swap');

:root {
  --rosa:      #F72585;
  --rosa-esc:  #C0006A;
  --amarelo:   #FFD93D;
  --amar-esc:  #C9A000;
  --verde:     #06D6A0;
  --verd-esc:  #04A07A;
  --azul:      #118AB2;
  --azul-esc:  #0B6080;
  --fundo:     #F0F4FF;
  --texto:     #1A1A2E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--fundo);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOPO ── */
.topo {
  background: #1A1A2E;
  box-shadow: 0 6px 0 #000;
  padding: 16px 20px 14px;
  text-align: center;
}
.topo h1 {
  font-family: 'Baloo 2', cursive;
  font-size: 22px; font-weight: 900;
  color: var(--amarelo);
  text-shadow: 2px 3px 0 #000;
  letter-spacing: 1px;
}
.topo-sub { font-size: 13px; color: #aaa; font-weight: 700; margin-top: 3px; }

/* ── CONCEITO ── */
.conceito {
  background: var(--amarelo);
  border-bottom: 4px solid var(--amar-esc);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
}
.conceito p {
  font-family: 'Baloo 2', cursive;
  font-size: 14px; font-weight: 900; color: #5A3A00; line-height: 1.4;
}

/* ── CONTEÚDO ── */
.wrap {
  max-width: 560px; width: 100%;
  margin: 0 auto;
  padding: 18px 14px 30px;
  flex: 1;
}

.card-pergunta {
  background: #fff;
  border-radius: 24px;
  border: 4px solid #E5E7EB;
  box-shadow: 0 6px 0 #D1D5DB;
  padding: 22px 16px 18px;
  margin-bottom: 14px;
  text-align: center;
}
.num-pergunta {
  font-size: 12px;
  font-family: 'Baloo 2', cursive; font-weight: 900;
  color: #C4B5FD; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 10px;
}
.pergunta-label {
  display: inline-block;
  font-size: 12px; font-weight: 900;
  font-family: 'Baloo 2', cursive;
  border-radius: 20px;
  padding: 4px 14px; margin-bottom: 16px;
  letter-spacing: 1px; border: 2px solid;
  background: #FEF3C7; color: #92400E; border-color: #FDE68A;
}
.placa-img-wrap {
  display: flex; align-items: center; justify-content: center;
  margin: 0 0 6px;
}
.placa-img-wrap img {
  width: 160px; height: 160px;
  object-fit: contain; border-radius: 12px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
}
.pergunta-texto {
  font-family: 'Baloo 2', cursive;
  font-size: 15px; font-weight: 900;
  color: #555; margin-top: 8px;
}

/* ── FEEDBACK ── */
.feedback-box {
  background: #fff; border-radius: 16px;
  padding: 10px 14px; margin-top: 12px;
  font-family: 'Baloo 2', cursive; font-size: 14px; font-weight: 900;
  line-height: 1.4; display: none; border: 3px solid;
}
.feedback-box.show { display: block; animation: aparecer .3s ease; }
.feedback-box.ok   { border-color: var(--verde); color: #065F46; background: #ECFDF5; }
.feedback-box.no   { border-color: var(--rosa);  color: var(--rosa-esc); background: #FFF0F5; }

@keyframes aparecer { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── OPÇÕES ── */
.opcoes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 4px;
}
.opcao {
  background: #fff;
  border: 4px solid #E5E7EB;
  border-radius: 18px;
  padding: 12px 8px; text-align: center;
  cursor: pointer; transition: all .18s;
  user-select: none; position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 80px; gap: 6px;
}
.opcao:not(.travada):hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--amarelo);
  box-shadow: 0 6px 0 var(--amar-esc);
}
.opcao:not(.travada):active { transform: scale(.94); }
.opcao.travada  { cursor: default; pointer-events: none; }
.opcao.certa    { border-color: var(--verde); background: #ECFDF5; box-shadow: 0 5px 0 var(--verd-esc); animation: pula .4s ease; }
.opcao.errada   { border-color: var(--rosa);  background: #FFF0F5; box-shadow: 0 5px 0 var(--rosa-esc); animation: treme .4s ease; }
@keyframes pula  { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }
@keyframes treme { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

.opcao img {
  width: 64px; height: 64px; object-fit: contain;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
.opcao-txt-grande {
  font-family: 'Baloo 2', cursive;
  font-size: 16px; font-weight: 900;
  color: var(--texto); line-height: 1.3;
  text-align: center; white-space: pre-line;
}
.opcao-badge {
  position: absolute; top: -8px; right: -8px;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 13px; display: flex; align-items: center; justify-content: center;
  border: 2px solid white; box-shadow: 0 2px 4px #0003;
}
.badge-ok { background: var(--verde); color: #fff; }
.badge-no { background: var(--rosa);  color: #fff; }

/* ── BOTÃO PRÓXIMA ── */
.btn-proxima {
  width: 100%; padding: 14px; border: none; border-radius: 16px;
  font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 900;
  cursor: pointer; background: #1A1A2E; color: var(--amarelo);
  box-shadow: 0 5px 0 #000; transition: all .15s;
  display: none; margin-top: 10px;
}
.btn-proxima.show { display: block; animation: aparecer .3s ease; }
.btn-proxima:hover  { transform: translateY(-2px); }
.btn-proxima:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }

/* ══════════════════════════════════════
   MODAL DE RESULTADO  (sem IDs duplicados)
══════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.78);
  z-index: 500;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.aberto { display: flex; }

.modal-box {
  border-radius: 32px;
  padding: 34px 26px;
  text-align: center;
  max-width: 360px; width: 100%;
  animation: pop .5s cubic-bezier(.4,2,.6,1);
  border: 5px solid;
}
@keyframes pop { from{opacity:0;transform:scale(.65)} to{opacity:1;transform:scale(1)} }

.modal-estrelas {
  font-size: 36px; letter-spacing: 4px; margin-bottom: 6px;
}
.modal-titulo {
  font-family: 'Baloo 2', cursive;
  font-size: 28px; font-weight: 900;
  color: #fff; margin-bottom: 10px;
}
.modal-circulo {
  width: 130px; height: 130px; border-radius: 50%;
  margin: 0 auto 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 6px solid;
}
.modal-nota-num {
  font-family: 'Baloo 2', cursive;
  font-size: 62px; font-weight: 900; line-height: 1;
}
.modal-nota-den {
  font-size: 18px; font-weight: 800; opacity: .65; color: #fff;
}
.modal-placar {
  font-family: 'Baloo 2', cursive;
  font-size: 16px; font-weight: 900;
  margin-bottom: 10px; line-height: 1.8;
}
.modal-msg {
  font-size: 14px; font-weight: 800;
  font-family: 'Nunito', sans-serif;
  margin-bottom: 22px; line-height: 1.5;
}
.modal-btn {
  border: none; border-radius: 16px;
  padding: 14px 28px;
  font-family: 'Baloo 2', cursive;
  font-size: 18px; font-weight: 900;
  cursor: pointer; width: 100%;
  transition: all .15s;
}
.modal-btn:hover  { transform: translateY(-2px); }
.modal-btn:active { transform: translateY(2px); }

/* ── CONFETES ── */
.cp {
  position: fixed; top: -20px; border-radius: 3px;
  opacity: 0; animation: cai 2.5s ease-in forwards;
  z-index: 600; pointer-events: none;
}
@keyframes cai {
  0%   { opacity:1; transform: translateY(0) rotate(0deg); }
  100% { opacity:0; transform: translateY(100vh) rotate(720deg); }
}

/* ── FOOTER ── */
footer {
  background: #1A1A2E; color: #aaa;
  text-align: center; padding: 10px 20px;
  font-size: 12px; font-weight: 700;
}
footer span { color: var(--amarelo); }

@media(max-width:380px) {
  .placa-img-wrap img { width: 130px; height: 130px; }
  .opcao img { width: 52px; height: 52px; }
  .opcao-txt-grande { font-size: 14px; }
}
</style>
</head>
<body>

<!-- ── CABEÇALHO ── -->
<div class="topo">
  <h1>🚦 PLACAS DE TRÂNSITO</h1>
  <div class="topo-sub">As placas também são uma linguagem!</div>
</div>

<div class="conceito">
  <p>🚗 As placas de trânsito mandam mensagens sem usar palavras! Você sabe o que elas dizem?</p>
</div>

<!-- ── JOGO ── -->
<div class="wrap">
  <div class="card-pergunta" id="card-pergunta">
    <div class="num-pergunta" id="num-pergunta">PERGUNTA 1 DE 10</div>
    <span class="pergunta-label" id="pergunta-label">🚦 O QUE ESSA PLACA DIZ?</span>
    <div class="placa-img-wrap" id="placa-img-wrap">
      <img id="img-placa" src="" alt="placa de trânsito">
    </div>
    <div class="pergunta-texto" id="pergunta-texto"></div>
    <div class="feedback-box"  id="feedback-box"></div>
  </div>

  <div class="opcoes-grid" id="opcoes-grid"></div>
  <button class="btn-proxima" id="btn-proxima">PRÓXIMA ➜</button>
</div>

<!-- ── MODAL DE RESULTADO (único, sem duplicatas) ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-estrelas" id="modal-estrelas"></div>
    <div class="modal-titulo"   id="modal-titulo"></div>
    <div class="modal-circulo"  id="modal-circulo">
      <span class="modal-nota-num" id="modal-nota-num"></span>
      <span class="modal-nota-den">/ 10</span>
    </div>
    <div class="modal-placar" id="modal-placar"></div>
    <div class="modal-msg"    id="modal-msg"></div>
    <button class="modal-btn" id="modal-btn" onclick="reiniciar()">🔄 JOGAR NOVAMENTE</button>
  </div>
</div>

<footer>Material Pedagógico – <span>Profª Adriana Bett Terebinto</span></footer>

<script>
/* ══════════════════════════════════════
   BANCO DE PLACAS
══════════════════════════════════════ */
const PLACAS = {
  pare:       'https://cdn.awsli.com.br/800x800/2755/2755133/produto/276152106/placa-pare-parada-obrigat-ria-r-1-8mutyhjh17.jpg',

  velocidade: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRd_26FWtqsIV8V4jUK-kAlcmCoTev-twbt9HY0t0y3eGrYmzuporPwoJ77&s=10',
  pedestre:   'https://cdn.awsli.com.br/1012/1012749/produto/37736639/43d20dbeb7.jpg',
  escola:     'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Placa_A-33a.svg/200px-Placa_A-33a.svg.png',
  curva:      'https://images.tcdn.com.br/img/img_prod/861159/placa_de_transito_advertencia_a_1a_curva_acentuada_a_esquerda_2791803_1_bb3d08ab95e27146b89c322cfef2f6b4.jpg',
  semaforo:   'https://cdn.awsli.com.br/1012/1012749/produto/37703470/fae7a04d27.jpg',
  bicicleta:  'https://cdn.awsli.com.br/1012/1012749/produto/37775156/14d0f78d9c.jpg',
  onibus:     'https://images.tcdn.com.br/img/img_prod/81/placa_ponto_de_parada_onibus_sau_26_resolucao_contran_no_180_65215_1_ce96a1df6ef4c869a3841746681fcd8a.png',
  lombada:    'https://cdn.awsli.com.br/2500x2500/2755/2755133/produto/276189585/placa-sali-ncia-ou-lombada-com-seta-a-18-pra-esquerda-k864o23ia1.jpg',
};

const BANCO = [
  {
    tipo: 'img_para_txt', placa: PLACAS.pare, alt: 'Placa PARE vermelha octogonal',
    pergunta: 'O que essa placa manda fazer?',
    opcoes: [
      { txt: 'PARE!',             ok: true  },
      { txt: 'SIGA EM FRENTE',    ok: false },
      { txt: 'VÁ DEVAGAR',        ok: false },
      { txt: 'DOBRE À DIREITA',   ok: false },
    ],
    fbOk: '✅ Certo! A placa PARE manda o motorista parar completamente antes de cruzar!',
    fbNo:  '❌ Errou! Essa é a placa PARE — o motorista precisa parar completamente.',
  },
  {
    tipo: 'img_para_txt', placa: PLACAS.proibido, alt: 'Placa proibido estacionar',
    pergunta: 'O que essa placa proíbe?',
    opcoes: [
      { txt: 'PROIBIDO ESTACIONAR',  ok: true  },
      { txt: 'PROIBIDO VIRAR',       ok: false },
      { txt: 'PROIBIDO ENTRAR',      ok: false },
      { txt: 'PROIBIDO ULTRAPASSAR', ok: false },
    ],
    fbOk: '✅ Isso! Essa placa significa PROIBIDO ESTACIONAR neste local!',
    fbNo:  '❌ Não! Essa placa significa PROIBIDO ESTACIONAR.',
  },
  {
    tipo: 'img_para_txt', placa: PLACAS.velocidade, alt: 'Placa de velocidade máxima 40 km/h',
    pergunta: 'O que o número nessa placa indica?',
    opcoes: [
      { txt: 'VELOCIDADE MÍNIMA',          ok: false },
      { txt: 'VELOCIDADE MÁXIMA\n40 KM/H', ok: true  },
      { txt: 'NÚMERO DA RUA',              ok: false },
      { txt: 'DISTÂNCIA ATÉ A CIDADE',     ok: false },
    ],
    fbOk: '✅ Perfeito! O número na placa mostra a velocidade máxima permitida neste trecho!',
    fbNo:  '❌ Errou! Essa placa diz que o limite de velocidade é 40 km/h.',
  },
  {
    tipo: 'img_para_txt', placa: PLACAS.pedestre, alt: 'Placa de passagem de pedestres',
    pergunta: 'O que essa placa avisa ao motorista?',
    opcoes: [
      { txt: 'CUIDADO COM ANIMAIS',           ok: false },
      { txt: 'FAIXA DE PEDESTRES\nà frente!', ok: true  },
      { txt: 'PROIBIDO ANDAR A PÉ',           ok: false },
      { txt: 'ESTACIONAMENTO',                ok: false },
    ],
    fbOk: '✅ Isso mesmo! Essa placa avisa que há uma faixa de pedestres à frente!',
    fbNo:  '❌ Essa placa avisa que há uma faixa de pedestres à frente.',
  },
  {
    tipo: 'img_para_txt', placa: PLACAS.escola, alt: 'Placa de área escolar',
    pergunta: 'Por que os motoristas precisam ir devagar aqui?',
    opcoes: [
      { txt: 'TEM UM HOSPITAL PERTO', ok: false },
      { txt: 'TEM UMA ESCOLA PERTO',  ok: true  },
      { txt: 'TEM UM PARQUE PERTO',   ok: false },
      { txt: 'TEM UM SEMÁFORO PERTO', ok: false },
    ],
    fbOk: '✅ Certo! Tem uma escola perto — os motoristas devem reduzir a velocidade!',
    fbNo:  '❌ Essa placa indica que há uma escola próxima — é preciso ir devagar!',
  },
  {
    tipo: 'img_para_txt', placa: PLACAS.curva, alt: 'Placa de curva acentuada à esquerda',
    pergunta: 'O que essa placa avisa sobre a estrada?',
    opcoes: [
      { txt: 'ESTRADA RETA',           ok: false },
      { txt: 'TEM UMA CURVA À FRENTE', ok: true  },
      { txt: 'PODE ULTRAPASSAR',       ok: false },
      { txt: 'FIM DA PISTA',           ok: false },
    ],
    fbOk: '✅ Isso! A placa avisa que tem uma curva acentuada à frente — cuidado!',
    fbNo:  '❌ Essa placa avisa que tem uma curva acentuada na estrada.',
  },
  {
    tipo: 'img_para_txt', placa: PLACAS.semaforo, alt: 'Placa de semáforo à frente',
    pergunta: 'O que o motorista vai encontrar mais à frente?',

      { txt: 'UMA LOMBADA',       ok: false },
      { txt: 'UM SEMÁFORO',       ok: true  },
      { txt: 'UMA CURVA FECHADA', ok: false },
      { txt: 'UMA ESCOLA',        ok: false },

    fbOk: '✅ Perfeito! Essa placa avisa que tem um semáforo mais à frente!',

  },
  {
    tipo: 'img_para_txt', placa: PLACAS.bicicleta, alt: 'Placa proibido circular de bicicleta',
    pergunta: 'O que essa placa proíbe nesta via?',
    opcoes: [
      { txt: 'CARROS',     ok: false },
      { txt: 'PEDESTRES',  ok: false },
      { txt: 'BICICLETAS', ok: true  },
      { txt: 'MOTOS',      ok: false },
    ],
    fbOk: '✅ Certo! Nessa via bicicletas não podem circular!',
    fbNo:  '❌ Essa placa significa proibido circular de bicicleta nesta via.',
  },
  {
    tipo: 'txt_para_img', placa: null, alt: '',
    pergunta: '🔍 Qual dessas é a placa de PARE?',
    opcoes: [
      { img: PLACAS.pare,       alt: 'Placa PARE',             ok: true  },
      { img: PLACAS.proibido,   alt: 'Placa proibido estac.',  ok: false },
      { img: PLACAS.velocidade, alt: 'Placa velocidade máx.',  ok: false },
      { img: PLACAS.lombada,    alt: 'Placa lombada',          ok: false },
    ],
    fbOk: '✅ Isso mesmo! A placa vermelha octogonal (8 lados) é o PARE!',
    fbNo:  '❌ A placa de PARE é a vermelha com formato de oito lados (octógono)!',
  },
  {
    tipo: 'txt_para_img', placa: null, alt: '',
    pergunta: '🔍 Qual placa avisa que tem uma ESCOLA perto?',
    opcoes: [
      { img: PLACAS.pedestre, alt: 'Placa faixa pedestres', ok: false },
      { img: PLACAS.curva,    alt: 'Placa curva',           ok: false },
      { img: PLACAS.escola,   alt: 'Placa área escolar',    ok: true  },
      { img: PLACAS.semaforo, alt: 'Placa semáforo',        ok: false },
    ],
    fbOk: '✅ Perfeito! Essa placa mostra duas crianças e avisa que tem uma escola perto!',
    fbNo:  '❌ A placa de escola mostra duas crianças caminhando — é um triângulo amarelo.',
  },
];

/* ══════════════════════════════════════
   ESTADO DO JOGO
══════════════════════════════════════ */
let perguntas = [], atual = 0, certos = 0, erros = 0, travado = false;

function embaralhar(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

/* ── INICIAR ── */
function iniciar() {
  perguntas = embaralhar(BANCO);
  atual = 0; certos = 0; erros = 0; travado = false;
  renderPergunta();
}

/* ── RENDER PERGUNTA ── */
function renderPergunta() {
  const q = perguntas[atual];
  travado = false;

  document.getElementById('num-pergunta').textContent =
    `PERGUNTA ${atual + 1} DE ${perguntas.length}`;

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.textContent = '';

  // Recria botão para limpar listeners
  const btnAntigo = document.getElementById('btn-proxima');
  const btnNovo = btnAntigo.cloneNode(true);
  btnAntigo.parentNode.replaceChild(btnNovo, btnAntigo);
  btnNovo.className = 'btn-proxima';

  const imgPlaca = document.getElementById('img-placa');
  const pTexto   = document.getElementById('pergunta-texto');
  const wrap     = document.getElementById('placa-img-wrap');
  const label    = document.getElementById('pergunta-label');

  if (q.tipo === 'img_para_txt') {
    label.textContent    = '🚦 O QUE ESSA PLACA DIZ?';
    wrap.style.display   = 'flex';
    imgPlaca.src         = q.placa;
    imgPlaca.alt         = q.alt;
    pTexto.textContent   = q.pergunta;
  } else {
    label.textContent    = '🔍 ENCONTRE A PLACA CERTA!';
    wrap.style.display   = 'none';
    imgPlaca.src         = '';
    pTexto.textContent   = q.pergunta;
  }

  const grid = document.getElementById('opcoes-grid');
  grid.innerHTML = '';

  embaralhar(q.opcoes).forEach(op => {
    const div = document.createElement('div');
    div.className = 'opcao';

    if (q.tipo === 'img_para_txt') {
      const span = document.createElement('span');
      span.className   = 'opcao-txt-grande';
      span.textContent = op.txt;
      div.appendChild(span);
    } else {
      const img = document.createElement('img');
      img.src = op.img; img.alt = op.alt;
      div.appendChild(img);
    }

    div.onclick = () => responder(div, op, q);
    grid.appendChild(div);
  });
}

/* ── RESPONDER ── */
function responder(el, op, q) {
  if (travado) return;
  travado = true;
  document.querySelectorAll('.opcao').forEach(o => o.classList.add('travada'));

  const fb = document.getElementById('feedback-box');

  if (op.ok) {
    certos++;
    el.classList.add('certa');
    adicionarBadge(el, true);
    fb.textContent = q.fbOk;
    fb.className   = 'feedback-box show ok';
  } else {
    erros++;
    el.classList.add('errada');
    adicionarBadge(el, false);

    document.querySelectorAll('.opcao').forEach(o => {
      if (q.tipo === 'img_para_txt') {
        const t = o.querySelector('.opcao-txt-grande');
        if (t && q.opcoes.find(x => x.ok && x.txt === t.textContent)) marcarCerta(o);
      } else {
        const img = o.querySelector('img');
        if (img && q.opcoes.find(x => x.ok && x.img === img.src)) marcarCerta(o);
      }
    });

    fb.textContent = q.fbNo;
    fb.className   = 'feedback-box show no';
  }

  const btn    = document.getElementById('btn-proxima');
  const novoBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(novoBtn, btn);

  if (atual + 1 >= perguntas.length) {
    novoBtn.textContent = '🏁 VER MEU RESULTADO!';
    novoBtn.addEventListener('click', mostrarNota);
  } else {
    novoBtn.textContent = 'PRÓXIMA ➜';
    novoBtn.addEventListener('click', proxima);
  }
  novoBtn.className = 'btn-proxima show';
}

function adicionarBadge(el, ok) {
  const b = document.createElement('div');
  b.className   = 'opcao-badge ' + (ok ? 'badge-ok' : 'badge-no');
  b.textContent = ok ? '✓' : '✗';
  el.appendChild(b);
}
function marcarCerta(o) {
  o.classList.add('certa');
  adicionarBadge(o, true);
}
function proxima() {
  atual++;
  renderPergunta();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── MOSTRAR NOTA (modal colorido) ── */
function mostrarNota() {
  const nota = certos;

  const cfgs = [
    { min:10, max:10, e:'⭐⭐⭐⭐⭐', t:'PERFEITO! 🏆',
      bg:'#064E3B', br:'#10B981', cb:'#065F46', nc:'#6EE7B7',
      bb:'#10B981', bs:'#047857', mc:'#D1FAE5',
      m:'Você acertou tudo! Já conhece as placas como um especialista!' },
    { min:8,  max:9,  e:'⭐⭐⭐⭐',   t:'MUITO BEM! 🎉',
      bg:'#1E3A5F', br:'#38BDF8', cb:'#0D5A94', nc:'#BAE6FD',
      bb:'#38BDF8', bs:'#0369A1', mc:'#E0F2FE',
      m:'Quase tudo certo! Você entendeu bem as placas!' },
    { min:6,  max:7,  e:'⭐⭐⭐',     t:'PARABÉNS! 😊',
      bg:'#451A03', br:'#FB923C', cb:'#7C2D12', nc:'#FED7AA',
      bb:'#FB923C', bs:'#C2410C', mc:'#FFEDD5',
      m:'Boa tentativa! Pratique mais para tirar 10!' },
    { min:0,  max:5,  e:'⭐⭐',       t:'TENTE MAIS! 💪',
      bg:'#2E1065', br:'#A78BFA', cb:'#4C1D95', nc:'#EDE9FE',
      bb:'#A78BFA', bs:'#6D28D9', mc:'#EDE9FE',
      m:'Continue praticando! Você vai aprender todas as placas!' },
  ];
  const c = cfgs.find(x => nota >= x.min && nota <= x.max) || cfgs[3];

  // Aplica estilos dinâmicos
  const box  = document.getElementById('modal-box');
  box.style.background = c.bg;
  box.style.borderColor = c.br;

  const circ = document.getElementById('modal-circulo');
  circ.style.background  = c.cb;
  circ.style.borderColor = c.br;

  const nNum = document.getElementById('modal-nota-num');
  nNum.style.color  = c.nc;
  nNum.textContent  = nota;

  document.getElementById('modal-estrelas').textContent = c.e;
  document.getElementById('modal-titulo').textContent   = c.t;

  const placar = document.getElementById('modal-placar');
  placar.style.color   = c.mc;
  placar.innerHTML     = `✅ Acertos: ${certos} &nbsp;|&nbsp; ❌ Erros: ${erros}`;

  const msg = document.getElementById('modal-msg');
  msg.style.color  = c.mc;
  msg.textContent  = c.m;

  const btn = document.getElementById('modal-btn');
  btn.style.background = c.bb;
  btn.style.color      = '#fff';
  btn.style.boxShadow  = `0 4px 0 ${c.bs}`;

  // Abre o modal
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('aberto');

  // Confetes para nota boa
  if (nota >= 7) confetti();
}

/* ── REINICIAR ── */
function reiniciar() {
  document.getElementById('modal-overlay').classList.remove('aberto');
  iniciar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── CONFETES ── */
function confetti() {
  const cores = ['#F72585','#FFD93D','#06D6A0','#118AB2','#7B2FBE','#FF6B35'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'cp';
      c.style.left              = Math.random() * 100 + 'vw';
      c.style.background        = cores[Math.floor(Math.random() * cores.length)];
      c.style.width             = (Math.random() * 8 + 5)  + 'px';
      c.style.height            = (Math.random() * 10 + 7) + 'px';
      c.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
      c.style.borderRadius      = Math.random() > .5 ? '50%' : '3px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 45);
  }
}

iniciar();
</script>
