<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placas de Trânsito – Jogo das Linguagens</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@700;800;900&display=swap');

:root {
  --rosa:      #F72585;
  --rosa-esc:  #C0006A;
  --amarelo:   #FFD93D;
  --amar-esc:  #C9A000;
  --verde:     #06D6A0;
  --verd-esc:  #04A07A;
  --azul:      #118AB2;
  --azul-esc:  #0B6080;
  --fundo:     #F0F4FF;
  --texto:     #1A1A2E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--fundo);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topo {
  background: #1A1A2E;
  box-shadow: 0 6px 0 #000;
  padding: 16px 20px 14px;
  text-align: center;
}
.topo h1 {
  font-family: 'Baloo 2', cursive;
  font-size: 22px; font-weight: 900;
  color: var(--amarelo);
  text-shadow: 2px 3px 0 #000;
  letter-spacing: 1px;
}
.topo-sub { font-size: 13px; color: #aaa; font-weight: 700; margin-top: 3px; }

.conceito {
  background: var(--amarelo);
  border-bottom: 4px solid var(--amar-esc);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  text-align: center;
}
.conceito p {
  font-family: 'Baloo 2', cursive;
  font-size: 14px; font-weight: 900; color: #5A3A00; line-height: 1.4;
}

.wrap {
  max-width: 560px; width: 100%;
  margin: 0 auto;
  padding: 18px 14px 30px;
  flex: 1;
}

.card-pergunta {
  background: #fff;
  border-radius: 24px;
  border: 4px solid #E5E7EB;
  box-shadow: 0 6px 0 #D1D5DB;
  padding: 22px 16px 18px;
  margin-bottom: 14px;
  text-align: center;
}
.num-pergunta {
  font-size: 12px;
  font-family: 'Baloo 2', cursive; font-weight: 900;
  color: #C4B5FD; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 10px;
}
.pergunta-label {
  display: inline-block;
  font-size: 12px; font-weight: 900;
  font-family: 'Baloo 2', cursive;
  border-radius: 20px;
  padding: 4px 14px;
  margin-bottom: 16px;
  letter-spacing: 1px;
  border: 2px solid;
  background: #FEF3C7; color: #92400E; border-color: #FDE68A;
}

/* Imagem da placa */
.placa-img-wrap {
  display: flex; align-items: center; justify-content: center;
  margin: 0 0 6px;
}
.placa-img-wrap img {
  width: 160px;
  height: 160px;
  object-fit: contain;
  border-radius: 12px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
}
.pergunta-texto {
  font-family: 'Baloo 2', cursive;
  font-size: 15px; font-weight: 900;
  color: #555; margin-top: 8px;
}

.feedback-box {
  background: #fff; border-radius: 16px;
  padding: 10px 14px; margin-top: 12px;
  font-family: 'Baloo 2', cursive; font-size: 14px; font-weight: 900;
  line-height: 1.4; display: none; border: 3px solid;
}
.feedback-box.show { display: block; animation: aparecer .3s ease; }
.feedback-box.ok   { border-color: var(--verde); color: #065F46; background: #ECFDF5; }
.feedback-box.no   { border-color: var(--rosa);  color: var(--rosa-esc); background: #FFF0F5; }
@keyframes aparecer { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Grid de opções */
.opcoes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}

.opcao {
  background: #fff;
  border: 4px solid #E5E7EB;
  border-radius: 18px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: all .18s;
  user-select: none;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80px;
  gap: 6px;
}
.opcao:not(.travada):hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--amarelo);
  box-shadow: 0 6px 0 var(--amar-esc);
}
.opcao:not(.travada):active { transform: scale(.94); }
.opcao.travada  { cursor: default; pointer-events: none; }
.opcao.certa    { border-color: var(--verde); background: #ECFDF5; box-shadow: 0 5px 0 var(--verd-esc); animation: pula .4s ease; }
.opcao.errada   { border-color: var(--rosa);  background: #FFF0F5; box-shadow: 0 5px 0 var(--rosa-esc); animation: treme .4s ease; }
@keyframes pula  { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }
@keyframes treme { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

/* Opção: imagem da placa */
.opcao img {
  width: 64px; height: 64px;
  object-fit: contain;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}

/* Opção: texto grande */
.opcao-txt-grande {
  font-family: 'Baloo 2', cursive;
  font-size: 16px; font-weight: 900;
  color: var(--texto);
  line-height: 1.3; text-align: center;
}

.opcao-badge {
  position: absolute; top: -8px; right: -8px;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 13px; display: flex; align-items: center; justify-content: center;
  border: 2px solid white; box-shadow: 0 2px 4px #0003;
}
.badge-ok { background: var(--verde); color: #fff; }
.badge-no { background: var(--rosa);  color: #fff; }

.btn-proxima {
  width: 100%; padding: 14px; border: none; border-radius: 16px;
  font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 900;
  cursor: pointer; background: #1A1A2E; color: var(--amarelo);
  box-shadow: 0 5px 0 #000; transition: all .15s; display: none;
}
.btn-proxima.show { display: block; animation: aparecer .3s ease; }
.btn-proxima:hover  { transform: translateY(-2px); }
.btn-proxima:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }

/* NOTA FINAL */
.overlay-nota {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); z-index: 300;
  align-items: center; justify-content: center; padding: 20px;
}
.overlay-nota.show { display: flex; }
.nota-box {
  border-radius: 32px; padding: 34px 26px;
  text-align: center; max-width: 350px; width: 100%;
  animation: pop .5s cubic-bezier(.4,2,.6,1);
}
@keyframes pop { from{opacity:0;transform:scale(.65)} to{opacity:1;transform:scale(1)} }
.nota-estrelas { font-size: 38px; letter-spacing: 5px; margin-bottom: 8px; }
.nota-titulo   { font-family: 'Baloo 2', cursive; font-size: 28px; font-weight: 900; margin-bottom: 6px; }
.nota-circulo  {
  width: 130px; height: 130px; border-radius: 50%;
  margin: 10px auto; display: flex; flex-direction: column;
  align-items: center; justify-content: center; border: 6px solid;
}
.nota-num   { font-family: 'Baloo 2', cursive; font-size: 60px; font-weight: 900; line-height: 1; }
.nota-den   { font-size: 18px; font-weight: 800; opacity: .6; color: #fff; }
.nota-msg   { font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; margin: 10px 0 20px; line-height: 1.5; white-space: pre-line; }
.btn-refazer {
  border: none; border-radius: 16px; padding: 14px 28px;
  font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 900;
  cursor: pointer; width: 100%; transition: all .15s;
}
.btn-refazer:hover { transform: translateY(-2px); }

.cp { position:fixed;top:-20px;border-radius:3px;opacity:0;animation:cai 2.5s ease-in forwards;z-index:400;pointer-events:none; }
@keyframes cai { 0%{opacity:1;transform:translateY(0) rotate(0)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }

footer {
  background: #1A1A2E; color: #aaa;
  text-align: center; padding: 10px 20px;
  font-size: 12px; font-weight: 700;
}
footer span { color: var(--amarelo); }

@media(max-width:380px) {
  .placa-img-wrap img { width: 130px; height: 130px; }
  .opcao img { width: 52px; height: 52px; }
  .opcao-txt-grande { font-size: 14px; }
}
</style>
</head>
<body>

<div class="topo">
  <h1>🚦 PLACAS DE TRÂNSITO</h1>
  <div class="topo-sub">As placas também são uma linguagem!</div>
</div>

<div class="conceito">
  <p>🚗 As placas de trânsito mandam mensagens sem usar palavras! Você sabe o que elas dizem?</p>
</div>

<div class="wrap">
  <div class="card-pergunta" id="card-pergunta">
    <div class="num-pergunta" id="num-pergunta">PERGUNTA 1 DE 10</div>
    <span class="pergunta-label">🚦 O QUE ESSA PLACA DIZ?</span>
    <div class="placa-img-wrap">
      <img id="img-placa" src="" alt="placa de trânsito">
    </div>
    <div class="pergunta-texto" id="pergunta-texto"></div>
    <div class="feedback-box" id="feedback-box"></div>
  </div>

  <div class="opcoes-grid" id="opcoes-grid"></div>
  <button class="btn-proxima" id="btn-proxima">PRÓXIMA ➜</button>
</div>

<footer>Material Pedagógico – <span>Profª Adriana Bett Terebinto</span></footer>

<div class="overlay-nota" id="overlay-nota">
  <div class="nota-box" id="nota-box">
    <div class="nota-estrelas" id="nota-estrelas"></div>
    <div class="nota-titulo"   id="nota-titulo"></div>
    <div class="nota-circulo"  id="nota-circulo">
      <span class="nota-num" id="nota-num"></span>
      <span class="nota-den">/ 10</span>
    </div>
    <div class="nota-msg" id="nota-msg"></div>
    <button class="btn-refazer" onclick="reiniciar()">🔄 JOGAR NOVAMENTE</button>
  </div>
</div>

<script>
/*
  BANCO DE PLACAS
  Imagens via Wikimedia Commons (domínio público / licença livre)

  tipo pergunta:
    'img_para_txt' → mostra imagem da placa, resposta é texto (palavras)
    'txt_para_img' → mostra texto, resposta é escolher a imagem correta

  URLs: placas brasileiras reais do Wikimedia
*/

const PLACAS = {
  pare:       'https://cdn.awsli.com.br/800x800/2755/2755133/produto/276152106/placa-pare-parada-obrigat-ria-r-1-8mutyhjh17.jpg',
  proibido:   'https://cdn.awsli.com.br/2500x2500/2755/2755133/produto/276152241/placa-proibido-estacionar-r-6a-p97aenyqqz.jpg',
  velocidade: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Placa_R-19_40.svg/200px-Placa_R-19_40.svg.png',
  pedestre:   'https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Placa_A-32.svg/200px-Placa_A-32.svg.png',
  escola:     'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Placa_A-33a.svg/200px-Placa_A-33a.svg.png',
  curva:      'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Placa_A-1a.svg/200px-Placa_A-1a.svg.png',
  semaforo:   'https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Placa_A-16.svg/200px-Placa_A-16.svg.png',
  bicicleta:  'https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Placa_R-34.svg/200px-Placa_R-34.svg.png',
  onibus:     'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Placa_R-27.svg/200px-Placa_R-27.svg.png',
  sentido:    'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Placa_R-3.svg/200px-Placa_R-3.svg.png',
};

const BANCO = [
  {
    tipo: 'img_para_txt',
    placa: PLACAS.pare,
    alt: 'Placa PARE vermelha octogonal',
    pergunta: '',
    opcoes: [
      { txt: 'PARE', ok: true  },
      { txt: 'DEVAGAR', ok: false },
      { txt: 'SIGA', ok: false },
      { txt: 'PROIBIDO', ok: false },
    ],
    fbOk: '✅ Certo! A placa PARE manda parar o carro!',
    fbNo: '❌ Errou! Essa é a placa PARE — o motorista precisa parar.',
  },
  {
    tipo: 'img_para_txt',
    placa: PLACAS.proibido,
    alt: 'Placa de proibido entrar',
    pergunta: '',
    opcoes: [
      { txt: 'PODE ENTRAR', ok: false },
      { txt: 'PROIBIDO ENTRAR', ok: true  },
      { txt: 'DEVAGAR', ok: false },
      { txt: 'PARE', ok: false },
    ],
    fbOk: '✅ Isso! Essa placa significa PROIBIDO ENTRAR!',
    fbNo: '❌ Não! Essa placa significa PROIBIDO ENTRAR.',
  },
  {
    tipo: 'img_para_txt',
    placa: PLACAS.velocidade,
    alt: 'Placa de velocidade máxima 40',
    pergunta: '',
    opcoes: [
      { txt: 'PODE CORRER', ok: false },
      { txt: 'VÁ RÁPIDO', ok: false },
      { txt: 'MÁXIMO 40 KM/H', ok: true  },
      { txt: 'PARE AQUI', ok: false },
    ],
    fbOk: '✅ Perfeito! O número na placa mostra a velocidade máxima permitida!',
    fbNo: '❌ Errou! Essa placa diz que o limite de velocidade é 40 km/h.',
  },
  {
    tipo: 'img_para_txt',
    placa: PLACAS.pedestre,
    alt: 'Placa de pedestres',
    pergunta: '',
    opcoes: [
      { txt: 'CUIDADO COM BICICLETA', ok: false },
      { txt: 'CUIDADO! TEM GENTE ATRAVESSANDO', ok: true  },
      { txt: 'PROIBIDO ANDAR A PÉ', ok: false },
      { txt: 'ESTACIONAMENTO', ok: false },
    ],
    fbOk: '✅ Isso mesmo! Tem pessoas atravessando a rua aqui!',
    fbNo: '❌ Essa placa avisa que há pedestres atravessando a rua.',
  },
  {
    tipo: 'img_para_txt',
    placa: PLACAS.escola,
    alt: 'Placa de área escolar',
    pergunta: '',
    opcoes: [
      { txt: 'SUPERMERCADO PRÓXIMO', ok: false },
      { txt: 'HOSPITAL PERTO', ok: false },
      { txt: 'ESCOLA PERTO — DEVAGAR!', ok: true  },
      { txt: 'PARQUE INFANTIL', ok: false },
    ],
    fbOk: '✅ Certo! Tem uma escola perto — os motoristas precisam ir devagar!',
    fbNo: '❌ Essa placa indica escola próxima — é preciso ir devagar!',
  },
  {
    tipo: 'img_para_txt',
    placa: PLACAS.curva,
    alt: 'Placa de curva à esquerda',
    pergunta: '',
    opcoes: [
      { txt: 'ESTRADA RETA', ok: false },
      { txt: 'TEM UMA CURVA NA ESTRADA', ok: true  },
      { txt: 'PODE ULTRAPASSAR', ok: false },
      { txt: 'ESTACIONAMENTO', ok: false },
    ],
    fbOk: '✅ Isso! A placa avisa que tem uma curva à frente!',
    fbNo: '❌ Essa placa avisa que tem uma curva na estrada.',
  },
  {
    tipo: 'img_para_txt',
    placa: PLACAS.semaforo,
    alt: 'Placa de semáforo à frente',
    pergunta: '',
    opcoes: [
      { txt: 'TEM UM SEMÁFORO À FRENTE', ok: true  },
      { txt: 'PROIBIDO PARAR', ok: false },
      { txt: 'ESTRADA SEM SAÍDA', ok: false },
      { txt: 'PARE E OLHE', ok: false },
    ],
    fbOk: '✅ Perfeito! Essa placa avisa que tem um semáforo mais à frente!',
    fbNo: '❌ Essa placa avisa que há um semáforo à frente.',
  },
  {
    tipo: 'img_para_txt',
    placa: PLACAS.bicicleta,
    alt: 'Placa de proibido bicicleta',
    pergunta: '',
    opcoes: [
      { txt: 'CICLOVIA', ok: false },
      { txt: 'BICICLETAS PODEM ENTRAR', ok: false },
      { txt: 'PROIBIDO BICICLETAS', ok: true  },
      { txt: 'CUIDADO COM CICLISTAS', ok: false },
    ],
    fbOk: '✅ Certo! Nessa rua bicicletas não podem entrar!',
    fbNo: '❌ Essa placa significa proibido entrada de bicicletas.',
  },
  // Tipo: mostrar texto → escolher imagem correta
  {
    tipo: 'txt_para_img',
    placa: null,
    alt: '',
    pergunta: 'Qual é a placa de PARE?',
    opcoes: [
      { img: PLACAS.pare,       alt: 'Placa pare',         ok: true  },
      { img: PLACAS.proibido,   alt: 'Placa proibido',     ok: false },
      { img: PLACAS.velocidade, alt: 'Placa velocidade',   ok: false },
      { img: PLACAS.sentido,    alt: 'Placa sentido único', ok: false },
    ],
    fbOk: '✅ Isso mesmo! A placa vermelha octogonal é o PARE!',
    fbNo: '❌ A placa de PARE é a vermelha em formato octogonal!',
  },
  {
    tipo: 'txt_para_img',
    placa: null,
    alt: '',
    pergunta: 'Qual placa avisa que tem uma ESCOLA perto?',
    opcoes: [
      { img: PLACAS.pedestre, alt: 'Placa pedestre', ok: false },
      { img: PLACAS.curva,    alt: 'Placa curva',    ok: false },
      { img: PLACAS.escola,   alt: 'Placa escola',   ok: true  },
      { img: PLACAS.semaforo, alt: 'Placa semáforo', ok: false },
    ],
    fbOk: '✅ Perfeito! Essa placa avisa que tem uma escola perto!',
    fbNo: '❌ A placa de escola mostra duas crianças andando.',
  },
];

let perguntas = [], atual = 0, certos = 0, erros = 0, travado = false;

function embaralhar(a) {
  const r = [...a];
  for (let i = r.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [r[i],r[j]] = [r[j],r[i]];
  }
  return r;
}

function iniciar() {
  perguntas = embaralhar(BANCO);
  atual = 0; certos = 0; erros = 0; travado = false;
  renderPergunta();
}

function renderPergunta() {
  const q = perguntas[atual];
  travado = false;

  document.getElementById('num-pergunta').textContent = `PERGUNTA ${atual+1} DE ${perguntas.length}`;
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').textContent = '';
  document.getElementById('btn-proxima').className = 'btn-proxima';

  const imgPlaca = document.getElementById('img-placa');
  const pTexto   = document.getElementById('pergunta-texto');
  const wrap     = document.querySelector('.placa-img-wrap');

  if (q.tipo === 'img_para_txt') {
    // Mostra imagem da placa no topo
    wrap.style.display = 'flex';
    imgPlaca.src = q.placa;
    imgPlaca.alt = q.alt;
    pTexto.textContent = 'O que essa placa quer dizer?';
  } else {
    // Mostra texto no topo, sem imagem
    wrap.style.display = 'none';
    imgPlaca.src = '';
    pTexto.textContent = q.pergunta;
  }

  const grid = document.getElementById('opcoes-grid');
  grid.innerHTML = '';

  embaralhar(q.opcoes).forEach(op => {
    const div = document.createElement('div');
    div.className = 'opcao';

    if (q.tipo === 'img_para_txt') {
      // Resposta: texto grande
      const span = document.createElement('span');
      span.className = 'opcao-txt-grande';
      span.textContent = op.txt;
      div.appendChild(span);
    } else {
      // Resposta: imagem da placa
      const img = document.createElement('img');
      img.src = op.img;
      img.alt = op.alt;
      div.appendChild(img);
    }

    div.onclick = () => responder(div, op, q);
    grid.appendChild(div);
  });
}

function responder(el, op, q) {
  if (travado) return;
  travado = true;
  document.querySelectorAll('.opcao').forEach(o => o.classList.add('travada'));

  const fb = document.getElementById('feedback-box');

  if (op.ok) {
    certos++;
    el.classList.add('certa');
    const b = document.createElement('div');
    b.className = 'opcao-badge badge-ok'; b.textContent = '✓';
    el.appendChild(b);
    fb.textContent = q.fbOk;
    fb.className = 'feedback-box show ok';
  } else {
    erros++;
    el.classList.add('errada');
    const b = document.createElement('div');
    b.className = 'opcao-badge badge-no'; b.textContent = '✗';
    el.appendChild(b);
    document.querySelectorAll('.opcao').forEach(o => {
      // Para img_para_txt: comparar texto
      if (q.tipo === 'img_para_txt') {
        const t = o.querySelector('.opcao-txt-grande');
        if (t && q.opcoes.find(x => x.ok && x.txt === t.textContent)) {
          marcarCerta(o);
        }
      } else {
        const img = o.querySelector('img');
        if (img && q.opcoes.find(x => x.ok && x.img === img.src)) {
          marcarCerta(o);
        }
      }
    });
    fb.textContent = q.fbNo;
    fb.className = 'feedback-box show no';
  }

  const btn = document.getElementById('btn-proxima');
  if (atual + 1 >= perguntas.length) {
    btn.textContent = '🏁 VER MEU RESULTADO!';
    btn.onclick = mostrarNota;
  } else {
    btn.textContent = 'PRÓXIMA ➜';
    btn.onclick = proxima;
  }
  btn.className = 'btn-proxima show';
}

function marcarCerta(o) {
  o.classList.add('certa');
  const b2 = document.createElement('div');
  b2.className = 'opcao-badge badge-ok'; b2.textContent = '✓';
  o.appendChild(b2);
}

function proxima() {
  atual++;
  renderPergunta();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function mostrarNota() {
  const nota = Math.round((certos / perguntas.length) * 10);
  const cfgs = [
    { min:10,max:10, e:'⭐⭐⭐⭐⭐', t:'PERFEITO! 🏆',   bg:'#064E3B', br:'#10B981', cb:'#065F46', nc:'#6EE7B7', bb:'#10B981', bs:'#047857', mc:'#A7F3D0', m:'Você acertou tudo! Já conhece as placas como um especialista!' },
    { min:8, max:9,  e:'⭐⭐⭐⭐',   t:'MUITO BEM! 🎉',  bg:'#1E3A5F', br:'#1A7ABF', cb:'#0D5A94', nc:'#BAE6FD', bb:'#1A7ABF', bs:'#0D5A94', mc:'#BAE6FD', m:'Quase tudo certo! Você entendeu bem as placas!' },
    { min:6, max:7,  e:'⭐⭐⭐',     t:'PARABÉNS! 😊',   bg:'#451A03', br:'#F97316', cb:'#7C2D12', nc:'#FED7AA', bb:'#F97316', bs:'#C2410C', mc:'#FED7AA', m:'Boa tentativa! Pratique mais para tirar 10!' },
    { min:0, max:5,  e:'⭐⭐',       t:'TENTE MAIS! 💪', bg:'#4C1D95', br:'#7C3AED', cb:'#3B0764', nc:'#DDD6FE', bb:'#7C3AED', bs:'#5B21B6', mc:'#DDD6FE', m:'Continue praticando! Você vai aprender as placas!' },
  ];
  const cfg = cfgs.find(c => nota >= c.min && nota <= c.max) || cfgs[3];

  const box  = document.getElementById('nota-box');
  const circ = document.getElementById('nota-circulo');
  const nNum = document.getElementById('nota-num');

  box.style.cssText  = `background:${cfg.bg};border-radius:32px;padding:34px 26px;text-align:center;max-width:350px;width:100%;animation:pop .5s cubic-bezier(.4,2,.6,1);border:5px solid ${cfg.br};`;
  circ.style.cssText = `width:130px;height:130px;border-radius:50%;margin:10px auto;display:flex;flex-direction:column;align-items:center;justify-content:center;border:6px solid ${cfg.br};background:${cfg.cb};`;
  nNum.style.color = cfg.nc;
  nNum.textContent = nota;

  document.getElementById('nota-estrelas').textContent = cfg.e;
  const tEl = document.getElementById('nota-titulo');
  tEl.textContent = cfg.t; tEl.style.color = '#fff';

  const mEl = document.getElementById('nota-msg');
  mEl.textContent = cfg.m + `\n\n✅ Acertos: ${certos}/${perguntas.length}   ❌ Erros: ${erros}`;
  mEl.style.color = cfg.mc;

  const btn = document.getElementById('btn-refazer');
  btn.style.cssText = `background:${cfg.bb};color:#fff;border:none;border-radius:16px;padding:14px 28px;font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;cursor:pointer;width:100%;box-shadow:0 4px 0 ${cfg.bs};transition:all .15s;`;

  document.getElementById('overlay-nota').classList.add('show');
  if (nota >= 7) confetti();
}

function reiniciar() {
  document.getElementById('overlay-nota').classList.remove('show');
  iniciar();
}

function confetti() {
  const cores = ['#F72585','#FFD93D','#06D6A0','#118AB2','#7B2FBE','#FF6B35'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'cp';
      c.style.left = Math.random()*100+'vw';
      c.style.background = cores[Math.floor(Math.random()*cores.length)];
      c.style.width  = (Math.random()*8+5)+'px';
      c.style.height = (Math.random()*10+7)+'px';
      c.style.animationDuration = (Math.random()*1.5+1.5)+'s';
      c.style.borderRadius = Math.random()>.5?'50%':'3px';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 3000);
    }, i*45);
  }
}

iniciar();
</script>
</body>
</html>
